window:
  opacity: 0.9

  # scrolling:
history:
  10000

  # Scrolling distance multiplier.
  #multiplier: 3

# Font configuration
font:
  # Normal (roman) font face
  normal:
    family: Fira Code
    style: Regular

  # Bold font face
  bold:
    family: Fira Code
    style: Bold

  # Italic font face
  italic:
    family: Fira Code
    style: Italic

  # Bold italic font face
  bold_italic:
    family: Fira Code
    style: Bold Italic

  # Point size
  size: 10.5

colors:
  # Default colors
  primary:
    background: "#1d2021"
    foreground: "#d5c4a1"

  # Colors the cursor will use if `custom_cursor_colors` is true
  cursor:
    text: "#1d2021"
    cursor: "#d5c4a1"

  # Normal colors
  normal:
    black: "#1d2021"
    red: "#fb4934"
    green: "#b8bb26"
    yellow: "#fabd2f"
    blue: "#83a598"
    magenta: "#d3869b"
    cyan: "#8ec07c"
    white: "#d5c4a1"

  # Bright colors
  bright:
    black: "#665c54"
    red: "#fe8019"
    green: "#a9b665"
    yellow: "#504945"
    blue: "#bdae93"
    magenta: "#ebdbb2"
    cyan: "#d65d0e"
    white: "#fbf1c7"



  #cursor:
  # Cursor style
  style:
    # Cursor shape
    #
    # Values for `shape`:
    #   - ▇ Block
    #   - _ Underline
    #   - | Beam
    shape: Beam

    # Cursor blinking state
    #
    # Values for `blinking`:
    #   - Never: Prevent the cursor from ever blinking
    #   - Off: Disable blinking by default
    #   - On: Enable blinking by default
    #   - Always: Force the cursor to always blink
    blinking: Off

  # Vi mode cursor style
  #
  # If the vi mode cursor style is `None` or not specified, it will fall back to
  # the style of the active value of the normal cursor.
  #
  # See `cursor.style` for available options.
  #vi_mode_style: None


# Shell
#
# You can set `shell.program` to the path of your favorite shell, e.g.
# `/bin/fish`. Entries in `shell.args` are passed unmodified as arguments to the
# shell.
#
# Default:
#   - (macOS) /bin/bash --login
#   - (Linux/BSD) user login shell
#   - (Windows) powershell
shell:
  program: /bin/zsh
  args:
    - -l
    - -c
    - "tmux attach || tmux"
#    - --login


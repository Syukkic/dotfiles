include-file = ~/.config/polybar/modules.ini

[colors]
background = #CC282A2E
background-alt = #373B41
foreground = #C5C8C6
primary = #F0C674
secondary = #8ABEB7
alert = #A54242
disabled = #707880

[bar/bar]
monitor = ${env:MONITOR:}
width = 100%
height = 20pt
radius = 0.0

dpi = 100

background = ${colors.background}
foreground = ${colors.foreground}

line-size = 1.5pt

border-size = 4pt
border-color = #00000000

padding-top = 0
padding-left = 0
padding-right = 1


module-margin = 1

separator = |
separator-foreground = ${colors.disabled}

font-0 = hack; 2
font-1 = hack; 2
font-2 = hack; 2
font-3 = hack nerd font; 2

modules-left = i3 xwindow
modules-center = 
modules-right = cpu memory pacman-updates filesystem volume battery date

cursor-click = pointer
cursor-scroll = ns-resize

enable-ipc = true

tray-position = right
tray-padding = 2
tray-transparent = true
tray-background = #CC282A2E
tray-maxsize = 19

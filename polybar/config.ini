include-file = ~/.config/polybar/modules.ini

[colors]
background = #CC282A2E
background-alt = #373B41
foreground = #C5C8C6
primary = #F0C674
secondary = #8ABEB7
alert = #A54242
disabled = #707880

[bar/bar]
monitor = ${env:MONITOR:}
width = 100%
height = 26pt
radius = 8.0


dpi = 112

background = ${colors.background}
foreground = ${colors.foreground}

line-size = 1.5pt

border-size = 4pt
border-color = #00000000

padding-top = 0
padding-left = 0
padding-right = 1


module-margin = 1

separator = |
separator-foreground = ${colors.disabled}

font-0 = hack; 4
font-1 = hack; 4
font-2 = hack nerd font; 4

modules-left = i3
# modules-center = xwindow
modules-right = filesystem cpu memory pacman-updates volume wlan eth battery date

cursor-click = pointer
cursor-scroll = ns-resize

enable-ipc = true

tray-position = right
tray-padding = 2 
tray-transparent = true
tray-background = #CC282A2E
tray-maxsize = 22

; wm-restack = generic
; wm-restack = bspwm
; wm-restack = i3

; override-redirect = true



